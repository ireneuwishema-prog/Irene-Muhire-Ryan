<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login and Register Forms</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="page-wrapper">
        <section class="form-card">
            <h1>Login Form</h1>
            <form action="#" method="post">
                <label for="login-language">Language</label>
                <select id="login-language" name="language" required>
                    <option value="en">English</option>
                    <option value="fr">Français</option>
                    <option value="rw">Kinyarwanda</option>
                </select>

                <label for="login-email">Email address</label>
                <input type="email" id="login-email" name="email" placeholder="you@example.com" required>

                <label for="login-password">Password</label>
                <input type="password" id="login-password" name="password" placeholder="Enter your password" required>

                <div class="form-actions">
                    <label>
                        <input type="checkbox" name="remember" checked>
                        Remember me
                    </label>
                </div>

                <button type="submit">Login</button>
            </form>
        </section>

        <section class="form-card">
            <h1>Register Form</h1>
            <form action="#" method="post">
                <label for="register-language">Language</label>
                <select id="register-language" name="language" required>
                    <option value="en">English</option>
                    <option value="fr">Français</option>
                    <option value="rw">Kinyarwanda</option>
                </select>

                <label for="register-fullname">Full name</label>
                <input type="text" id="register-fullname" name="fullname" placeholder="Your name" required>

                <label for="register-email">Email address</label>
                <input type="email" id="register-email" name="email" placeholder="you@example.com" required>

                <label for="register-password">Password</label>
                <input type="password" id="register-password" name="password" placeholder="Create a password" required>

                <div class="form-actions">
                    <label>
                        <input type="checkbox" name="agree" checked>
                        I agree to the terms
                    </label>
                </div>

                <button type="submit">Register</button>
            </form>
        </section>
    </div>
</body>
</html>
