<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <link rel="stylesheet" href="login-register.css">
    <script src="login-register.js" defer></script>
</head>
<body>

<section class="form-card">
    <h1 id="title">Register Form</h1>

    <label id="langLabel">Language</label>
    <select onchange="changeLanguage(this.value)">
        <option value="en">English</option>
        <option value="fr">Français</option>
        <option value="rw">Kinyarwanda</option>
    </select>

    <form onsubmit="return false;">
        <label id="nameLabel" for="nameInput">Full Name</label>
        <input id="nameInput" type="text" placeholder="Full name" required>

        <label id="emailLabel" for="emailInput">Email</label>
        <input id="emailInput" type="email" placeholder="Email" required>

        <label id="passwordLabel" for="passwordInput">Password</label>
        <input id="passwordInput" type="password" placeholder="Password" required minlength="6">

        <button id="mainButton" type="button" onclick="handleRegisterClick()">Register</button>
    </form>

    <p id="switchText">
        Already have an account?
        <a href="login.html">Login</a>
    </p>

    <p>
        <a href="home.html">Back Home</a>
    </p>
</section>

</body>
</html>
