<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>

    <link rel="stylesheet" href="login-register.css">
    <script src="register.js" defer></script>
</head>
<body>

<section class="form-card" role="main">
    <h1 id="title">Register Form</h1>

    <div class="language-selector">
        <label id="langLabel" for="languageSelect">Language</label>
        <select id="languageSelect" aria-label="Select language">
            <option value="en">English</option>
            <option value="fr">Français</option>
            <option value="rw">Kinyarwanda</option>
        </select>
    </div>

    <form id="registerForm" aria-describedby="switchText">
        <div class="form-group">
            <label id="nameLabel" for="nameInput">Full Name</label>
            <input id="nameInput" type="text" placeholder="Full name" required aria-required="true">
            <span id="nameError" class="error-message" role="alert"></span>
        </div>

        <div class="form-group">
            <label id="emailLabel" for="emailInput">Email</label>
            <input id="emailInput" type="email" placeholder="Email" required aria-required="true">
            <span id="emailError" class="error-message" role="alert"></span>
        </div>

        <div class="form-group">
            <label id="passwordLabel" for="passwordInput">Password</label>
            <input id="passwordInput" type="password" placeholder="Password" required minlength="6" aria-required="true">
            <span id="passwordError" class="error-message" role="alert"></span>
        </div>

        <button id="mainButton" type="button" aria-busy="false">Register</button>
    </form>

    <p id="switchText">
        Already have an account?
        <a href="login.html">Login</a>
    </p>

    <p>
        <a href="home.html">Back Home</a>
    </p>
</section>

</body>
</html>
