<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- Link CSS -->
    <link rel="stylesheet" href="login-register.css">

    <!-- Link JavaScript -->
    <script src="login-register.js" defer></script>
</head>
<body>

<section class="form-card" role="main">
    <h1 id="title">Login Form</h1>

    <!-- Language selector -->
    <div class="language-selector">
        <label id="langLabel" for="languageSelect">Language</label>
        <select id="languageSelect" aria-label="Select language">
            <option value="en">English</option>
            <option value="fr">Français</option>
            <option value="rw">Kinyarwanda</option>
        </select>
    </div>

    <form id="loginForm" aria-describedby="switchText">
        <!-- Email Block -->
        <div class="form-group">
            <label for="emailInput" id="emailLabel">Email</label>
            <input type="email" id="emailInput" placeholder="Email" required aria-required="true">
            <span id="emailError" class="error-message" role="alert"></span>
        </div>

        <!-- Password Block -->
        <div class="form-group">
            <label for="passwordInput" id="passwordLabel">Password</label>
            <input type="password" id="passwordInput" placeholder="Password" required aria-required="true">
            <span id="passwordError" class="error-message" role="alert"></span>
        </div>

        <button id="mainButton" type="button" aria-busy="false">Login</button>

        <div class="role-actions">
            <button type="button" class="btn-admin" onclick="window.location.href='./admin.html'">Admin Login</button>
        </div>
    </form>

    <p id="switchText">
        Don't have an account?
        <a href="register.html">Register</a>
    </p>

    <p>
        <a href="home.html">Back Home</a>
    </p>
</section>

</body>
</html>
