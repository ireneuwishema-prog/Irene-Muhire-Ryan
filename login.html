<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <!-- Link CSS -->
    <link rel="stylesheet" href="login-register.css">

    <!-- Link JavaScript -->
    <script src="login-register.js" defer></script>
</head>
<body>

<section class="form-card">
    <h1 id="title">Login Form</h1>

    <!-- Language selector -->
    <label id="langLabel">Language</label>
    <select onchange="changeLanguage(this.value)">
        <option value="en">English</option>
        <option value="fr">Français</option>
        <option value="rw">Kinyarwanda</option>
    </select>

<form onsubmit="return false;">
        <label id="emailLabel">Email</label>
        <input type="email">

        <label id="passwordLabel">Password</label>
        <input type="password">

<button id="mainButton" type="button" onclick="handleLoginClick()">Login</button>

        <div class="role-actions">
            <button type="button" class="btn-small" onclick="window.location.href='./admin.html'">Admin Login</button>
        </div>
    </form>

    <p id="switchText">
        I don't have an account?
        <a href="register.html">Register</a>
    </p>

    <p>
        <a href="home.html">Back Home</a>
    </p>
</section>

</body>
</html>
